{% extends 'experimentapp/base.html' %}

{% block title %}Agregar Registro - SIA{% endblock %}

{% block content %}
<div style="display: flex; justify-content: center; padding: 15px;">
    <div class="glass-card" style="max-width: 650px; width: 100%; padding: 30px 20px;">
        <div class="page-header" style="text-align: center;">
            <h1 class="page-title">Nuevo Registro de Asistencia</h1>
            <p class="page-subtitle">Asigne una licencia o novedad a un agente</p>
        </div>
        
        <form method="POST">
            {% csrf_token %}
            
            <div style="margin-bottom: 20px;">
                <label for="agent" style="display: block; margin-bottom: 8px; font-size: 14px; font-weight: 600; color: #475569;">Seleccionar Agente</label>
                <select id="agent" name="agent" required 
                       style="width: 100%; padding: 12px; border: 1px solid var(--border-color); border-radius: 8px; font-size: 15px; background: white;">
                    {% for agent in agents %}
                    <option value="{{ agent.id }}">{{ agent.name }}</option>
                    {% endfor %}
                </select>
            </div>

            <div style="margin-bottom: 20px;">
                <label for="record_type" style="display: block; margin-bottom: 8px; font-size: 14px; font-weight: 600; color: #475569;">Tipo de Licencia / Novedad</label>
                <select id="record_type" name="record_type" required 
                       style="width: 100%; padding: 12px; border: 1px solid var(--border-color); border-radius: 8px; font-size: 15px; background: white;">
                    {% for value, label in record_types %}
                    <option value="{{ value }}">{{ label }}</option>
                    {% endfor %}
                </select>
            </div>
            
            <div id="periods-container" style="margin-bottom: 15px;">
                <div class="period-row" style="display: grid; grid-template-columns: 1fr 1fr auto; gap: 15px; align-items: flex-end; margin-bottom: 15px;">
                    <div>
                        <label style="display: block; margin-bottom: 8px; font-size: 14px; font-weight: 600; color: #475569;">Fecha Inicio</label>
                        <input type="text" name="fecha_inicio[]" class="datepicker" required
                               placeholder="DD/MM/YYYY"
                               style="width: 100%; padding: 12px; border: 1px solid var(--border-color); border-radius: 8px; font-size: 15px; background: #f8fafc;">
                    </div>
                    <div>
                        <label style="display: block; margin-bottom: 8px; font-size: 14px; font-weight: 600; color: #475569;">Fecha Fin (Opcional)</label>
                        <input type="text" name="fecha_fin[]" class="datepicker"
                               placeholder="DD/MM/YYYY"
                               style="width: 100%; padding: 12px; border: 1px solid var(--border-color); border-radius: 8px; font-size: 15px; background: #f8fafc;">
                    </div>
                    <div>
                        <button type="button" class="btn btn-secondary" onclick="addPeriodRow()" style="height: 47px; width: 47px; padding: 0; font-size: 20px; display: flex; align-items: center; justify-content: center;" title="Agregar otro período">+</button>
                    </div>
                </div>
            </div>

            <div style="margin-bottom: 30px;">
                <label for="notes" style="display: block; margin-bottom: 8px; font-size: 14px; font-weight: 600; color: #475569;">Notas Adicionales</label>
                <textarea id="notes" name="notes" rows="4"
                          style="width: 100%; padding: 12px; border: 1px solid var(--border-color); border-radius: 8px; font-size: 15px; background: #f8fafc; font-family: inherit; resize: vertical;"
                          placeholder="Ingrese detalles relevantes aquí..."></textarea>
            </div>
            
            <div style="display: flex; gap: 15px; margin-top: 40px; flex-wrap: wrap;">
                <button type="submit" class="btn btn-primary" style="flex: 2; min-width: 200px;">Guardar Registro</button>
                <a href="{% url 'home' %}" class="btn btn-secondary" style="flex: 1; min-width: 120px;">Cancelar</a>
            </div>
        </form>
    </div>
</div>

<script>
function addPeriodRow() {
    const container = document.getElementById('periods-container');
    const row = document.createElement('div');
    row.className = 'period-row';
    row.style.cssText = 'display: flex; gap: 15px; align-items: flex-end; margin-bottom: 15px; flex-wrap: wrap;';
    
    row.innerHTML = `
        <div style="flex: 1; min-width: 200px;">
            <input type="text" name="fecha_inicio[]" class="datepicker" required
                   placeholder="DD/MM/YYYY"
                   style="width: 100%; padding: 12px; border: 1px solid var(--border-color); border-radius: 8px; font-size: 15px; background: #f8fafc;">
        </div>
        <div style="flex: 1; min-width: 200px;">
            <input type="text" name="fecha_fin[]" class="datepicker"
                   placeholder="DD/MM/YYYY"
                   style="width: 100%; padding: 12px; border: 1px solid var(--border-color); border-radius: 8px; font-size: 15px; background: #f8fafc;">
        </div>
        <div style="width: 47px;">
            <button type="button" class="btn btn-danger" onclick="this.closest('.period-row').remove()" style="height: 47px; width: 47px; padding: 0; font-size: 20px; display: flex; align-items: center; justify-content: center;" title="Eliminar período">×</button>
        </div>
    `;
    
    container.appendChild(row);
    
    // Initialize flatpickr for the new inputs
    const newInputs = row.querySelectorAll('.datepicker');
    if (typeof flatpickr !== 'undefined') {
        var config = window.fpConfig || {
            dateFormat: "d/m/Y",
            allowInput: true,
            disable: [
                function(date) { return (date.getDay() === 0 || date.getDay() === 6); }
            ],
            onClose: function(selectedDates, dateStr, instance) {
                if (selectedDates.length === 0 && instance.input.value) {
                    instance.setDate(instance.input.value, false, "d/m/Y");
                }
            }
        };
        flatpickr(newInputs, config);
    }
}
</script>
{% endblock %}
