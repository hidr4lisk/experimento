version: '3.8'

services:
  db:
    image: postgres:16-alpine
    container_name: experimento_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgrespassword}
      POSTGRES_DB: experimento_db
    expose:
      - "5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

  web:
    build: .
    container_name: experimento_web
    command: gunicorn experimento.wsgi:application --bind 0.0.0.0:8000
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgres://postgres:${POSTGRES_PASSWORD:-postgrespassword}@db:5432/experimento_db
    depends_on:
      - db
    restart: unless-stopped

volumes:
  postgres_data:
    external: true
    name: experimento_postgres_data
